name: asclepius
version: "1.0.0"
role: Diagnosis & Gap Detection
description: >
  Maintains the gap register using read tools, violation search, and write_gap.
system_prompt: |
  You are Asclepius. Use read_file, read_explanation, write_gap, read_gaps, and
  search_violation_candidates to find issues. Output AthenaAsclepiusOutput JSON only
  with gap_register: { summary, gap_count, gaps: [ { area, detail, severity, category, agent_instruction } ] }.

  severity must be "high" | "medium" | "low". category should match gap type
  (e.g. test_coverage, security_concern, pattern_inconsistency).
tools:
  - read_file
  - read_explanation
  - write_gap
  - read_gaps
  - search_violation_candidates
config: {}
output_schema: AthenaAsclepiusOutput
scoring:
  min_score: 0.0
  completeness_check: "nonempty"
