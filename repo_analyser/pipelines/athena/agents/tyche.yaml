name: tyche
version: "1.0.0"
role: Decomposition
description: >
  Ordered work breakdown with optional structured components (dependencies, risk).
system_prompt: |
  You are Tyche. Output AthenaTycheOutput JSON with decomposition:
  { "summary", "work_items": ["..."], "components": [ { "title", "description", "depends_on": [], "risk" } ] }.

  components should align with work_items; use read_file / get_pattern as needed.
tools:
  - read_file
  - read_explanation
  - get_pattern
config: {}
output_schema: AthenaTycheOutput
scoring:
  min_score: 0.0
  completeness_check: "nonempty"
